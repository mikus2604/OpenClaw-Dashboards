name: Update Star Counts

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual runs from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch star counts and detect rank changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPOS=(
            "abhi1693/openclaw-mission-control"
            "crshdn/mission-control"
            "grp06/openclaw-studio"
            "getclawe/clawe"
            "carlosazaustre/tenacitOS"
            "23blocks-OS/ai-maestro"
            "mithun50/openclaw-termux"
            "madrzak/vidclaw"
            "mudrii/openclaw-dashboard"
            "tugcantopaloglu/openclaw-dashboard"
            "Temaki-AI/clawd-control"
            "daggerhashimoto/openclaw-nerve"
            "jontsai/openclaw-command-center"
            "spleck/claw-dashboard"
            "karem505/openclaw-agent-dashboard"
            "nachoiacovino/clawtrol"
            "bokiko/openClaw-dashboard"
          )

          TODAY=$(date -u +"%Y-%m-%d")
          JSON="{\"updated\":\"$TODAY\",\"repos\":{"

          for i in "${!REPOS[@]}"; do
            REPO="${REPOS[$i]}"
            DATA=$(gh api repos/$REPO --jq '{stars:.stargazers_count,forks:.forks_count,name:.name}' 2>/dev/null || echo '{"stars":0,"forks":0,"name":""}')
            STARS=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['stars'])")
            FORKS=$(echo $DATA | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['forks'])")

            if [ $i -gt 0 ]; then JSON="$JSON,"; fi
            JSON="$JSON\"$REPO\":{\"stars\":$STARS,\"forks\":$FORKS}"
          done

          JSON="$JSON}}"
          echo $JSON | python3 -m json.tool > data/stars.json
          echo "Star data written to data/stars.json"
          cat data/stars.json

      - name: Check for significant rank changes
        id: rank_check
        run: |
          # Compare today's rankings to last week's if history exists
          ISSUE_BODY=""

          if [ -f "data/stars-history.jsonl" ]; then
            # Get last week's data
            LAST_LINE=$(tail -1 data/stars-history.jsonl)
            TODAY_JSON=$(cat data/stars.json)

            # Use Python to detect rank changes of 2+ positions
            CHANGES=$(python3 << 'PYEOF'
          import json

          with open("data/stars.json") as f:
              today = json.load(f)["repos"]

          last_line = open("data/stars-history.jsonl").readlines()
          if len(last_line) < 2:
              exit(0)

          last_week = json.loads(last_line[-2])["repos"]

          # Sort both by stars
          today_ranked = sorted(today.items(), key=lambda x: x[1]["stars"], reverse=True)
          last_ranked = sorted(last_week.items(), key=lambda x: x[1]["stars"], reverse=True)

          today_rank = {repo: i+1 for i, (repo, _) in enumerate(today_ranked)}
          last_rank = {repo: i+1 for i, (repo, _) in enumerate(last_ranked)}

          changes = []
          for repo in today_rank:
              if repo in last_rank:
                  delta = last_rank[repo] - today_rank[repo]  # positive = moved up
                  star_delta = today[repo]["stars"] - last_week.get(repo, {}).get("stars", 0)
                  if abs(delta) >= 2 or abs(star_delta) >= 100:
                      direction = "🔼" if delta > 0 else "🔽"
                      changes.append(f"- **{repo}**: rank {last_rank[repo]} → {today_rank[repo]} ({direction}{abs(delta)} positions), stars {last_week.get(repo, {}).get('stars', '?')} → {today[repo]['stars']} (+{star_delta})")

          if changes:
              print("\n".join(changes))
          PYEOF
          )

            if [ -n "$CHANGES" ]; then
              echo "rank_changes=true" >> $GITHUB_OUTPUT
              echo "changes<<EOF" >> $GITHUB_OUTPUT
              echo "$CHANGES" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "rank_changes=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "rank_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Append to history log
        run: |
          # Append today's snapshot to the JSONL history file
          cat data/stars.json | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)))" >> data/stars-history.jsonl
          # Keep only last 52 weeks (52 lines)
          tail -52 data/stars-history.jsonl > /tmp/stars-history-trimmed.jsonl
          mv /tmp/stars-history-trimmed.jsonl data/stars-history.jsonl
          echo "History log updated ($(wc -l < data/stars-history.jsonl) weeks)"

      - name: Open issue for significant rank changes
        if: steps.rank_check.outputs.rank_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEEK=$(date -u +"%Y-W%V")
          gh issue create \
            --title "📊 Dashboard rankings shifted — week of $WEEK" \
            --label "tracking" \
            --body "$(cat << 'EOF'
          ## Star Ranking Changes This Week

          The following dashboards moved 2+ positions or gained/lost 100+ stars:

          ${{ steps.rank_check.outputs.changes }}

          ---
          *Auto-generated by the [update-stars workflow](../../actions/workflows/update-stars.yml). Close this issue once reviewed.*
          EOF
          )"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stars.json data/stars-history.jsonl
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update star counts $(date -u +%Y-%m-%d)"
            git push
          fi
